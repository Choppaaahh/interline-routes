site_name: Interline
site_description: "OpenRouter for agent payments — a neutral, non-custodial router over the fragmented agent-payment-rail stack."
site_url: https://choppaaahh.github.io/interline-routes/
repo_url: https://github.com/Choppaaahh/interline-routes
repo_name: Choppaaahh/interline-routes
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Rails & the Rail Protocol: rails.md
  - MCP server: mcp.md
  - Go live: go-live.md
  - Trust model: trust-model.md
